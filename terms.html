body {
    margin:0;

}

/* ナビゲーションバー */
nav {
    background:#111;
    padding:15px;
    text-align:center;
    position: sticky;
    top:0;
    z-index:100;
}

/* リンクデフォルト色：水色 */
nav a {
    color:#00ffff;  /* 水色 */
    margin:0 15px;
    text-decoration:none;
    font-size:18px;
    transition: color 0.3s;
}

/* カーソルを合わせるとピンク */
nav a:hover {
    color:#ff4da6;  /* ピンク */
}
/* ヘッダー */
header {
    padding:60px 20px 20px 20px;
    font-size:45px;
    font-weight:bold;
}

/* 段落 */
p {
    font-size:18px;
    margin:10px 0;
}

/* 応募ボタン */
.join-btn {
    display:inline-block;
    margin-top:40px;
    padding:18px 50px;
    background:#ff4da6;
    color:white;
    text-decoration:none;
    border-radius:40px;
    font-size:22px;
    transition: background 0.3s;
}

.join-btn:hover {
    background:#ff2f90;
}

/* チーム規約リンク */
.rules {
    margin-top:40px;
    font-size:16px;
}

/* aタグ全体色 */
a {
    color:#ff4da6;
    text-decoration:none;
}

a:hover {
    text-decoration:underline;
}

/* フッター */
footer {
    margin-top:100px;
    padding:20px;
    border-top:1px solid #333;
    font-size:14px;
}
</style>
</head>
