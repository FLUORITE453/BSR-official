<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#000;
color:white;
text-align:center;
}

/* ナビ */

nav{
background:#111;
padding:15px;
}

nav a{
color:#00d9ff;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#ff4da6;
}

/* タイトル */

h1{
margin-top:40px;
font-size:3rem;
color:#ff4da6;
}

/* チーム */

.team{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:50px;
padding:20px;
}

/* メンバーカード */

.member{
background:#111;
border:1px solid #00d9ff;
border-radius:12px;
width:220px;
padding:20px;
transition:0.3s;
cursor:pointer;
}

.member:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #00d9ff;
}

/* 画像 */

.member img{
width:100px;
border-radius:50%;
margin-bottom:10px;
}

/* 名前 */

.member h2{
color:#00d9ff;
margin-bottom:5px;
}

/* 役職 */

.member p{
font-size:14px;
}

/* リンク装飾消す */

.member-link{
text-decoration:none;
color:white;
}

/* フッター */

footer{
margin-top:60px;
padding:20px;
background:#111;
}
