h1 {
    font-size:3rem;
    color:#ff4da6;

}

/* チーム全体 */
.team {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:30px;
    padding:20px;
}

/* メンバーカード */
.member-link {
    text-decoration:none; /* aタグの下線を消す */
}

.member {
    background:#111;
    padding:20px;
    border-radius:15px;
    width:220px;
    transition: transform 0.3s, box-shadow 0.3s;
}

.member:hover {
    transform: translateY(-5px);
    box-shadow:0 0 15px #ff4da6;
}

/* メンバー画像 */
.member img {
    width:100%;
    border-radius:10px;
    margin-bottom:15px;
}

/* メンバー名 */
.member h2 {
    color:#00d9ff; /* 水色 */
    margin-bottom:8px;
}

/* メンバー役職 */
.member p {
    color:#aaa;
    margin:3px 0;
    font-size:0.9rem;
}

/* フッター */
footer {
    background:#111;
    padding:20px;
    margin-top:40px;
    font-size:14px;
}

footer a {
    color:#00d9ff;
    text-decoration:none;
}

footer a:hover {
    color:#ff4da6;
}

</style>
</head>
