<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Join BSR</title>

<style>
body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

h1{
font-size:50px;
}

form{
margin-top:40px;
}

input, textarea{
display:block;
margin:10px auto;
padding:10px;
width:300px;
border-radius:10px;
border:none;
}

button{
padding:12px 30px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>Join BSR</h1>
<p>Become a member of Become Sirius.</p>

<form>
<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<input type="text" placeholder="Role (Player / Creator / Editor)">
<textarea placeholder="Why do you want to join?"></textarea>

<button>Send</button>
</form>

</body>
</html>
